name: 입찰알리미 공고 체크

on:
  schedule:
    # UTC 기준입니다. KST 08:07~21:37은 30분마다 실행하고,
    # KST 22:07~06:07은 2시간마다 실행해 야간 호출량을 줄입니다.
    - cron: '7 23,0-12 * * *'
    - cron: '37 23,0-12 * * *'
    - cron: '7 13,15,17,19,21 * * *'
  workflow_dispatch:          # 수동 실행

permissions:
  contents: write             # state.json 커밋 권한

concurrency:
  group: notice-check
  cancel-in-progress: false   # 진행 중인 작업은 완료 대기

env:
  G2B_API_KEY: ${{ secrets.G2B_API_KEY }}
  G2B_PREBID_API_KEY: ${{ secrets.G2B_PREBID_API_KEY }}
  FIREBASE_CREDENTIALS: ${{ secrets.FIREBASE_CREDENTIALS }}
  G2B_MAX_API_PAGES: "3"
  TZ: Asia/Seoul

jobs:
  check:
    # ubuntu-latest/24.x capacity incidents can delay scheduled jobs.
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          test -n "${G2B_API_KEY}" || { echo "G2B_API_KEY secret is missing"; exit 1; }
          test -n "${FIREBASE_CREDENTIALS}" || { echo "FIREBASE_CREDENTIALS secret is missing"; exit 1; }

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure run mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "${{ github.event.schedule }}" != "37 23,0-12 * * *" ]; then
            echo "RUN_PREBID=1" >> "$GITHUB_ENV"
          else
            echo "RUN_PREBID=0" >> "$GITHUB_ENV"
          fi

      - name: Run notice checker
        run: python -m src.main

      - name: Commit state changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "chore: update state [skip ci]"
          git pull --rebase origin main || git rebase --abort
          git push || echo "Push failed, will retry next run"
